<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0A0D18; --panel: #161c38; --line: #2b3560;
    --ink: #e9ecf7; --muted: #9aa4cf; --amber: #ffb648; --peri: #8b96c9;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 84% -12%, rgba(255,182,72,0.14), transparent 60%),
      radial-gradient(900px 520px at 2% 6%, rgba(139,150,201,0.14), transparent 55%),
      linear-gradient(180deg, #10142a 0%, #0A0D18 100%);
    font-family: var(--sans); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .chart { position: absolute; inset: 0; width: 1200px; height: 630px; opacity: 0.9; }
  .frame { position: absolute; inset: 0; padding: 84px 90px; display: flex; flex-direction: column; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 22px; }
  .mark { width: 78px; height: 78px; border-radius: 19px; background: var(--bg); border: 1px solid var(--line); box-shadow: 0 18px 44px -22px rgba(0,0,0,0.7); }
  .wordmark { font-size: 66px; font-weight: 800; letter-spacing: -0.035em; line-height: 1; color: var(--ink); }
  .headline { max-width: 940px; }
  .headline h1 { font-size: 54px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.12; color: var(--ink); }
  .headline .amber { color: var(--amber); }
  .headline p { margin-top: 22px; font-size: 29px; font-weight: 500; letter-spacing: -0.01em; color: var(--muted); line-height: 1.35; max-width: 30ch; }
  .chips { display: flex; align-items: center; gap: 13px; }
  .chip { display: inline-flex; align-items: center; gap: 11px; padding: 12px 20px; border: 1px solid var(--line); border-radius: 999px; background: rgba(10,13,24,0.5); font-size: 23px; font-weight: 600; color: var(--muted); }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--amber { background: var(--amber); box-shadow: 0 0 0 4px rgba(255,182,72,0.16); }
  .chip .dot--peri { background: var(--peri); box-shadow: 0 0 0 4px rgba(139,150,201,0.18); }
</style>
</head>
<body>
  <!-- twin burn-down curves — the hero motif -->
  <svg class="chart" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <!-- erased span hatch -->
    <rect x="470" y="120" width="230" height="360" fill="rgba(255,182,72,0.10)"/>
    <line x1="470" y1="120" x2="700" y2="480" stroke="#ffb648" stroke-width="1" opacity="0.25"/>
    <line x1="510" y1="120" x2="700" y2="420" stroke="#ffb648" stroke-width="1" opacity="0.25"/>
    <line x1="550" y1="120" x2="700" y2="360" stroke="#ffb648" stroke-width="1" opacity="0.25"/>
    <!-- baseline periwinkle to far zero -->
    <path d="M120 130 C 500 180, 800 360, 1120 480" fill="none" stroke="#8b96c9" stroke-width="4" opacity="0.85"/>
    <!-- amber diving early -->
    <path d="M120 130 C 360 240, 520 430, 700 480" fill="none" stroke="#ffb648" stroke-width="5"/>
    <!-- closure tick + dot -->
    <line x1="700" y1="452" x2="700" y2="502" stroke="#ffb648" stroke-width="5"/>
    <circle cx="700" cy="480" r="8" fill="#ffb648"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M5 8 C 12 9, 18 15, 27 24" fill="none" stroke="#8b96c9" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
        <path d="M5 8 C 9 11, 12 20, 18 24" fill="none" stroke="#ffb648" stroke-width="2.9" stroke-linecap="round"/>
        <line x1="18" y1="20" x2="18" y2="27.5" stroke="#ffb648" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="18" cy="24" r="2" fill="#ffb648"/>
      </svg>
      <span class="wordmark">preclose</span>
    </div>

    <div class="headline">
      <h1>See exactly what a prepayment<br>does to your loan &mdash; <span class="amber">months erased.</span></h1>
      <p>Full amortization schedule. Reduce-EMI vs reduce-tenure verdict.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--amber"></span>interest saved</span>
      <span class="chip"><span class="dot dot--peri"></span>schedule rewritten</span>
      <span class="chip"><span class="dot dot--amber"></span>private &amp; offline</span>
    </div>
  </div>
</body>
</html>
